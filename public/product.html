<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pretty - Detalles del Producto</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-pink-50">
    <!-- Header -->
    <header class="bg-pink-100 shadow-md sticky top-0 z-50">
        <nav class="container mx-auto px-4 py-4">
            <div class="flex justify-between items-center">
                <div class="flex items-center space-x-4">
                    <a href="index.html" class="text-2xl font-bold text-purple-600 hover:text-purple-700 transition">
                        <i class="fas fa-store"></i> Pretty
                    </a>
                </div>
                <div class="flex items-center space-x-6">
                    <a href="index.html" class="text-gray-700 hover:text-purple-600 transition">
                        <i class="fas fa-arrow-left"></i> Volver a Tienda
                    </a>
                    <button onclick="showCart()" class="text-gray-700 hover:text-purple-600 transition">
                        <i class="fas fa-shopping-cart"></i> Carrito
                        <span id="cartCount" class="absolute -top-2 -right-2 bg-pink-400 text-white rounded-full w-5 h-5 flex items-center justify-center text-xs ml-2">0</span>
                    </button>
                </div>
            </div>
        </nav>
    </header>

    <!-- Main Content -->
    <main class="container mx-auto px-4 py-8">
        <div id="productDetails" class="max-w-6xl mx-auto">
            <!-- Product details will be loaded here -->
        </div>

        <!-- Cart Modal -->
        <div id="cartModal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-50">
            <div class="bg-purple-50 rounded-lg p-6 max-w-4xl w-full mx-4 max-h-[90vh] overflow-y-auto">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-2xl font-bold text-purple-800">
                        <i class="fas fa-shopping-cart"></i> Tu Carrito
                    </h3>
                    <button onclick="closeCart()" class="text-gray-500 hover:text-gray-700">
                        <i class="fas fa-times text-xl"></i>
                    </button>
                </div>
                
                <div id="cartItems" class="mb-6">
                    <!-- Cart items will be loaded here -->
                </div>
                
                <div class="border-t pt-4">
                    <div class="flex justify-between items-center mb-4">
                        <span class="text-xl font-semibold">Total:</span>
                        <span id="cartTotal" class="text-2xl font-bold text-purple-600">$0.00</span>
                    </div>
                    <div class="flex gap-4">
                        <button onclick="clearCart()" class="flex-1 bg-pink-400 text-white px-4 py-2 rounded-lg hover:bg-pink-500 transition">
                            <i class="fas fa-trash"></i> Vaciar Carrito
                        </button>
                        <button onclick="checkout()" class="flex-1 bg-purple-400 text-white px-4 py-2 rounded-lg hover:bg-purple-500 transition">
                            <i class="fas fa-credit-card"></i> Proceder al Pago
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-pink-100 border-t border-pink-200 mt-10">
        <div class="container mx-auto px-4 py-4 text-center text-sm text-purple-700">
            &copy; 2026 Pretty. Todos los derechos reservados.
        </div>
    </footer>

    <script src="js/product.js"></script>
</body>
</html>
